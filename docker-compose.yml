version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pmo-postgres
    environment:
      POSTGRES_USER: pmo_user
      POSTGRES_PASSWORD: pmo_password
      POSTGRES_DB: pmo_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmo_user -d pmo_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pmo-backend
    environment:
      DATABASE_URL: postgresql://pmo_user:pmo_password@postgres:5432/pmo_tracker?schema=public
      PORT: 3001
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
      ENABLE_CRON_JOBS: "true"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pmo-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
